<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Chakra+Petch:wght@600;700&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
@property --a{syntax:'<angle>';inherits:false;initial-value:0deg}
@property --bc{syntax:'<color>';inherits:true;initial-value:#00ff32}
.socials{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:16px;max-width:820px;margin:0 auto}
.fbtn{position:relative;height:66px;border-radius:13px;background:#0a0a13;overflow:hidden;display:block;
  border:2px solid var(--bc);transition:transform .18s;
  box-shadow:0 0 12px var(--bc),0 0 28px color-mix(in srgb,var(--bc) 42%,transparent),inset 0 0 16px color-mix(in srgb,var(--bc) 22%,transparent);
  animation:edgecycle 13s linear infinite}
.fbtn:hover{transform:translateY(-4px)}
@keyframes edgecycle{0%{--bc:#00ff32}25%{--bc:#b400ff}45%{--bc:#ff2079}65%{--bc:#ffe600}85%{--bc:#00ffff}100%{--bc:#00ff32}}
.fbtn::before{content:"";position:absolute;inset:-2px;border-radius:15px;padding:2px;z-index:4;pointer-events:none;
  background:conic-gradient(from var(--a),transparent 0 68%,color-mix(in srgb,var(--bc) 50%,#fff) 80%,var(--bc) 88%,#fff 90%,var(--bc) 92%,transparent 100%);
  -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;
  mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);mask-composite:exclude;animation:spin 3.1s linear infinite}
@keyframes spin{to{--a:360deg}}
.fbtn .flame{position:absolute;left:0;right:0;bottom:-6px;height:140%;z-index:1;mix-blend-mode:screen;
  filter:url(#pflame) blur(4px) contrast(1.55) brightness(1.05);
  background:
    radial-gradient(15% 62% at 14% 100%,rgba(180,0,255,.95),transparent 72%),
    radial-gradient(14% 82% at 29% 100%,rgba(0,255,50,.9),transparent 75%),
    radial-gradient(17% 94% at 45% 100%,rgba(180,0,255,.96),transparent 78%),
    radial-gradient(14% 84% at 61% 100%,rgba(0,255,50,.9),transparent 75%),
    radial-gradient(15% 66% at 78% 100%,rgba(180,0,255,.92),transparent 72%),
    radial-gradient(30% 24% at 50% 100%,rgba(150,255,180,.82),transparent 70%);
  animation:rise 2.9s ease-in-out infinite}
.fbtn .flame.f2{z-index:0;filter:url(#pflame) blur(10px) contrast(1.3);opacity:.5;animation:rise2 3.7s ease-in-out infinite}
@keyframes rise{0%,100%{transform:translateY(5%) scaleY(1)}50%{transform:translateY(-3%) scaleY(1.13)}}
@keyframes rise2{0%,100%{transform:translateY(3%) scaleY(1.05) scaleX(1.05)}50%{transform:translateY(-4%) scaleY(1.18) scaleX(.95)}}
.fbtn .in{position:relative;z-index:5;display:flex;align-items:center;gap:12px;height:100%;padding:0 16px}
.fbtn svg.ico{width:26px;height:26px;fill:#eafff0;flex:0 0 auto;filter:drop-shadow(0 0 6px color-mix(in srgb,var(--bc) 70%,transparent))}
.fbtn .kK{font-family:'Orbitron';font-weight:900;font-size:23px;color:#eafff0;width:26px;text-align:center;flex:0 0 auto;filter:drop-shadow(0 0 6px color-mix(in srgb,var(--bc) 70%,transparent))}
.fbtn .tx{display:flex;flex-direction:column;line-height:1.15;min-width:0}
.fbtn .tx b{font-family:'Orbitron';font-weight:900;font-size:15px;letter-spacing:2px;color:#fff;text-shadow:0 0 8px color-mix(in srgb,var(--bc) 60%,transparent)}
.fbtn .tx small{font-family:'Share Tech Mono';font-size:11px;letter-spacing:1px;color:#c7d6cf;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.soon{opacity:.9}
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <filter id="pflame" x="-25%" y="-25%" width="150%" height="150%">
    <feTurbulence type="fractalNoise" baseFrequency="0.02 0.03" numOctaves="2" seed="4" result="n">
      <animate attributeName="baseFrequency" dur="5s" values="0.02 0.03;0.025 0.052;0.02 0.03" repeatCount="indefinite"/>
    </feTurbulence>
    <feDisplacementMap in="SourceGraphic" in2="n" scale="24" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
</defs></svg>
